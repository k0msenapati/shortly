{% extends "base.html" %}

{% block title %}Login | Shortly{% endblock %}

{% block content %}
<div class="max-w-md mx-auto pt-20">
    <div class="boxy-card p-10">
        <h1 class="text-3xl font-serif font-bold text-white mb-2">Welcome Back</h1>
        <p class="text-[10px] uppercase tracking-widest text-ui-muted font-bold mb-10 pb-4 border-b border-ui-border">Access your dashboard</p>
        
        <div id="login-error" class="hidden mb-6 p-4 border border-rose-500/20 text-rose-500 text-[10px] uppercase font-bold tracking-widest"></div>
        
        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] uppercase tracking-widest text-ui-muted font-bold block">Email</label>
                <input type="email" id="email" placeholder="name@domain.com" required class="w-full">
            </div>
            
            <div class="space-y-2">
                <label class="text-[10px] uppercase tracking-widest text-ui-muted font-bold block">Password</label>
                <input type="password" id="password" placeholder="••••••••" required class="w-full">
            </div>
            
            <button type="submit" id="login-btn" class="btn-green w-full py-4 text-[10px] uppercase tracking-[0.2em] font-black mt-4">
                Sign In
            </button>
        </form>
        
        <div class="mt-10 pt-6 border-t border-ui-border text-center">
            <p class="text-xs text-ui-muted font-medium uppercase tracking-widest">
                New? <a href="/register" class="text-brand-500 hover:underline ml-1">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');

        errorMsg.classList.add('hidden');
        loginBtn.innerText = 'VERIFYING...';
        loginBtn.disabled = true;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || 'AUTH_FAILED');

            localStorage.setItem('token', data.access_token);
            window.location.href = '/dashboard';
        } catch (error) {
            errorMsg.innerText = 'ERROR: INVALID CREDENTIALS';
            errorMsg.classList.remove('hidden');
        } finally {
            loginBtn.innerText = 'SIGN IN';
            loginBtn.disabled = false;
        }
    });
</script>
{% endblock %}
